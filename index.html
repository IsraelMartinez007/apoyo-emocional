<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Centro de Apoyo Emocional</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a202c 0%, #2d3748 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            color: #e2e8f0;
            text-align: center;
            margin-bottom: 15px;
            font-size: 1.5em;
            font-weight: 600;
        }

        .header-text {
            text-align: center;
            color: #a0aec0;
            font-size: 0.9em;
            margin-bottom: 20px;
        }

        p {
            color: #4a5568;
            line-height: 1.5;
            margin-bottom: 12px;
        }

        .question {
            margin-bottom: 25px;
        }

        .question h3 {
            color: #1a202c;
            margin-bottom: 12px;
            font-size: 0.95em;
            font-weight: 500;
        }

        .options {
            display: flex;
            justify-content: space-between;
            gap: 4px;
        }

        .option-btn {
            flex: 1;
            padding: 10px 2px;
            border: 2px solid #cbd5e0;
            border-radius: 8px;
            background: white;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 0.7em;
            font-weight: 500;
            color: #4a5568;
        }

        .option-btn:hover {
            border-color: #1a202c;
            background: #f7fafc;
        }

        .option-btn.selected {
            background: #1a202c;
            color: white;
            border-color: #1a202c;
        }

        .btn {
            background: #1a202c;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 0.95em;
            cursor: pointer;
            width: 100%;
            font-weight: 500;
            margin-top: 12px;
        }

        .btn:hover {
            background: #2d3748;
        }

        .result {
            text-align: center;
            padding: 20px;
            background: #f7fafc;
            border-radius: 10px;
            margin: 15px 0;
        }

        .result-emoji {
            font-size: 3em;
            margin-bottom: 8px;
        }

        .result-title {
            color: #1a202c;
            font-size: 1.2em;
            font-weight: 600;
        }

        .advice {
            background: #fffbeb;
            border-left: 4px solid #d97706;
            padding: 12px;
            border-radius: 0 6px 6px 0;
            margin: 10px 0;
        }

        .advice-title {
            color: #b45309;
            font-weight: 600;
            font-size: 0.85em;
            margin-bottom: 4px;
        }

        .tip-box {
            background: #ecfdf5;
            border-left: 4px solid #059669;
            padding: 12px;
            border-radius: 0 6px 6px 0;
            margin: 8px 0;
        }

        .tip-title {
            color: #047857;
            font-weight: 600;
        }

        .breathing-exercise {
            text-align: center;
            padding: 20px;
        }

        .breath-circle {
            width: 110px;
            height: 110px;
            background: linear-gradient(135deg, #1a202c, #4a5568);
            border-radius: 50%;
            margin: 15px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1em;
            transition: transform 4s ease-in-out;
        }

        .qr-section {
            text-align: center;
            padding: 15px;
        }

        .qr-input {
            width: 100%;
            padding: 12px;
            border: 2px solid #cbd5e0;
            border-radius: 8px;
            font-size: 0.9em;
            margin-bottom: 12px;
            text-align: center;
        }

        .qr-input:focus {
            outline: none;
            border-color: #1a202c;
        }

        #qrcode {
            margin: 15px auto;
            display: flex;
            justify-content: center;
        }

        .hidden {
            display: none;
        }

        .tip-card {
            background: linear-gradient(135deg: #fef3c7, #fde68a);
            padding: 15px;
            border-radius: 10px;
            margin: 10px 0;
            text-align: center;
        }

        .tip-emoji {
            font-size: 2em;
            margin-bottom: 8px;
        }

        .progress-bar {
            width: 100%;
            height: 5px;
            background: #e2e8f0;
            border-radius: 3px;
            margin-bottom: 18px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: #1a202c;
            border-radius: 3px;
            transition: width 0.4s ease;
        }

        .nav-buttons {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }

        .nav-btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 6px;
            background: #e2e8f0;
            color: #1a202c;
            font-weight: 500;
            cursor: pointer;
            font-size: 0.85em;
        }

        .nav-btn:hover {
            background: #cbd5e0;
        }

        .icono-header {
            text-align: center;
            font-size: 2em;
            margin-bottom: 5px;
        }

        @media (max-width: 480px) {
            .card {
                padding: 18px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icono-header">&#127800;</div>
        <h1>Centro de Apoyo Emocional</h1>
        
        <div class="card" id="surveySection">
            <p class="header-text">Evaluacion anonima de bienestar emocional. Responde con honestidad.</p>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill" style="width: 0%"></div>
            </div>
            
            <div id="questionsContainer"></div>
        </div>

        <div class="card hidden" id="resultSection">
            <div class="result">
                <div class="result-emoji" id="resultEmoji"></div>
                <div class="result-title" id="resultTitle"></div>
                <p style="font-size: 0.85em; color: #718096;">Resultado de tu evaluacion</p>
            </div>
            
            <div id="adviceContainer"></div>
            
            <div class="nav-buttons">
                <button class="nav-btn" onclick="showDistraction()">Recursos</button>
                <button class="nav-btn" onclick="restartSurvey()">Nueva evaluacion</button>
            </div>
        </div>

        <div class="card hidden" id="distractionSection">
            <div class="tip-card" id="tipCard">
                <div class="tip-emoji" id="tipEmoji"></div>
                <p id="tipText"></p>
            </div>
            
            <button class="btn" onclick="newRandomTip()" style="background: #059669;">Siguiente consejo</button>
            
            <div class="breathing-exercise">
                <h3 style="font-size: 0.95em; color: #1a202c;">Respiracion guiada</h3>
                <p style="font-size: 0.8em;">4s inhale - 4s retenga - 4s exhale</p>
                <div class="breath-circle" id="breathCircle">&#128167;</div>
                <p id="breathText" style="font-size: 0.9em; font-weight: 500;">Iniciar ejercio</p>
                <button class="btn" onclick="toggleBreathing()" id="breathBtn">Iniciar</button>
                <button class="btn hidden" onclick="toggleBreathing()" id="stopBreathBtn" style="background: #e53e3e;">Detener</button>
            </div>
            
            <button class="nav-btn" onclick="showResults()">Ver resultado</button>
        </div>

        <div class="card" id="qrSection">
            <div class="qr-section">
                <h2 style="color: #1a202c; margin-bottom: 8px; font-size: 1.1em;">URL de esta pagina</h2>
                <p style="font-size: 0.8em; color: #718096; margin-bottom: 12px;">Pega la URL donde subas este archivo</p>
                <input type="text" class="qr-input" id="urlInput" placeholder="https://tu-dominio.com" oninput="generarQR()">
                <div id="qrcode"></div>
            </div>
        </div>
    </div>

    <script>
        var questions = [
            { id: 1, text: "Nivel de bienestar emocional general", options: ["Optimo", "Bueno", "Regular", "Bajo", "Critico"] },
            { id: 2, text: "Frecuencia de sintomatologia ansiosa", options: ["Nunca", "Rara vez", "Ocasional", "Frecuente", "Permanente"] },
            { id: 3, text: "Intensidad de pensamientos intrusivos/negativos", options: ["Ninguna", "Leve", "Moderada", "Alta", "Extrema"] },
            { id: 4, text: "Calidad del descanso nocturno", options: ["Excelente", "Buena", "Regular", "Deficiente", "Insomnio"] },
            { id: 5, text: "Percepcion de red de apoyo social", options: ["Solida", "Moderada", "Adecuada", "Debil", "Ausente"] },
            { id: 6, text: "Capacidad de regulacion emocional", options: ["Alta", "Buena", "Moderada", "Baja", "Ninguna"] },
            { id: 7, text: "Nivel de energia vital/motivacion", options: ["Alto", "Normal", "Bajo", "Muy bajo", "Agotamiento"] },
            { id: 8, text: "Frecuencia de pensamientos de ruin/perdida", options: ["Nunca", "Ocasional", "Frecuente", "Muy frecuente", "Permanente"] },
            { id: 9, text: "Capacidad de concentracion", options: ["Excelente", "Buena", "Regular", "Dificil", "Imposible"] },
            { id: 10, text: "Conexion con actividades significativas", options: ["Plena", "Buena", "Partial", "Escasa", "Ninguna"] }
        ];

        var answers = {};
        var currentQuestion = 0;
        var breathingInterval = null;
        var isBreathing = false;

        var highNeedAdvice = [
            { emoji: "&#128591;", title: "Recomendacion", text: "Considera solicitar ayuda profesional de salud mental." },
            { emoji: "&#128222;", title: "Recursos", text: "Contacta lineas de apoyo emocional en tu region." },
            { emoji: "&#127973;", title: "Autocuidado", text: "Prioriza descanso, alimentacion basica e higiene personal." },
            { emoji: "&#128153;", title: "Momentos", text: "Estos sentimientos son temporales. Busca un espacio seguro." },
            { emoji: "&#129309;", title: "Comunicacion", text: "Considera hablar con alguien de confianza. No estas solo." },
            { emoji: "&#9878;", title: "Presencia", text: "EstasAqui Ahora. Respira. Este momento pasara." },
            { emoji: "&#128167;", title: "Respiracion", text: "Respira lentamente: 4s inhale, 4s retenga, 4s exhale." }
        ];

        var mediumNeedAdvice = [
            { emoji: "&#128170;", title: "Resiliencia", text: "Has enfrentado dificultades antes. Confia en tu capacidad." },
            { emoji: "&#9878;", title: "Enfoque", text: "Identifica lo que puedes controlar y concentra tu energia ahi." },
            { emoji: "&#128221;", title: "Exprsion", text: "Escribir tus pensamientos puede ayudar a procesar emociones." },
            { emoji: "&#127939;", title: "Actividad", text: "El movimiento fisico ligero puede mejorar tu estado." },
            { emoji: "&#9200;", title: "Tiempo", text: "Dedica 10-15 minutos diarios a una actividad placentera." },
            { emoji: "&#127804;", title: "Perspectiva", text: "Chaque dia es una nueva oportunidad para mejorar." },
            { emoji: "&#127752;", title: "Proceso", text: "El cambio llega con pequenos pasos consistentes." }
        ];

        var lowNeedAdvice = [
            { emoji: "&#127775;", title: "Mantenimiento", text: "Continua con las practicas que te mantienen bien." },
            { emoji: "&#127881;", title: "Logros", text: "Reconoce tu progreso. Estas en buen camino." },
            { emoji: "&#10024;", title: "Gratitud", text: "Practica gratitud diariamente por las cosas positivas." },
            { emoji: "&#128149;", title: "Compartir", text: "Tu bienestar puede inspirar a otros." },
            { emoji: "&#128142;", title: "Crecimiento", text: "Considera nuevas metas o aprendizajes." },
            { emoji: "&#127822;", title: "Enfoque", text: "Busca la luz incluso en dias nublados." },
            { emoji: "&#11088;", title: "Futuro", text: "El futuro esta lleno de posibilidades." }
        ];

        var randomTips = [
            { emoji: "&#127804;", text: "Chaque dia es una nueva oportunidad para comenzar de nuevo." },
            { emoji: "&#129436;", text: "El cambio significativo comienza con un paso pequeno." },
            { emoji: "&#9728;", text: "Despues de la tormenta siempre sale el sol." },
            { emoji: "&#127754;", text: "Las emociones vienen y van. Todo es transitorio." },
            { emoji: "&#11088;", text: "Tu fortaleza es mayor que cualquier dificultad." },
            { emoji: "&#129717;", text: "Pedir ayuda es valentia, no debilidad." },
            { emoji: "&hearts;", text: "Tu valor es independiente de como te sientas hoy." },
            { emoji: "&#127752;", text: "El arcoiris viene despues de la lluvia." },
            { emoji: "&#128167;", text: "3 respiraciones profundas pueden cambiar tu momento." },
            { emoji: "&#128293;", text: "Confia en tu proceso." },
            { emoji: "&#128142;", text: "Las pruebas te hacen mas fuerte." },
            { emoji: "&#127880;", text: "Las mejoras vienen de formas inesperadas." },
            { emoji: "&#128400;", text: "El presente es lo que tienes." }
        ];

        function initSurvey() {
            var container = document.getElementById('questionsContainer');
            container.innerHTML = '';
            
            for (var i = 0; i < questions.length; i++) {
                var div = document.createElement('div');
                div.className = 'question';
                div.id = 'question-' + i;
                div.style.display = (i === 0) ? 'block' : 'none';
                
                var optionsHTML = '';
                for (var j = 0; j < questions[i].options.length; j++) {
                    optionsHTML += '<button class="option-btn" onclick="selectOption(' + i + ', ' + j + ', this)">' + questions[i].options[j] + '</button>';
                }
                
                div.innerHTML = '<h3>' + questions[i].text + '</h3><div class="options">' + optionsHTML + '</div>';
                
                container.appendChild(div);
            }
            
            currentQuestion = 0;
            updateProgress();
        }

        function selectOption(questionIndex, optionIndex, btn) {
            var questionDiv = document.getElementById('question-' + questionIndex);
            var buttons = questionDiv.querySelectorAll('.option-btn');
            for (var i = 0; i < buttons.length; i++) {
                buttons[i].classList.remove('selected');
            }
            btn.classList.add('selected');
            
            answers[questionIndex] = 5 - optionIndex;
            
            setTimeout(function() {
                if (questionIndex < questions.length - 1) {
                    document.getElementById('question-' + questionIndex).style.display = 'none';
                    document.getElementById('question-' + (questionIndex + 1)).style.display = 'block';
                    currentQuestion = questionIndex + 1;
                    updateProgress();
                } else {
                    submitSurvey();
                }
            }, 300);
        }

        function updateProgress() {
            var progress = ((currentQuestion + 1) / questions.length) * 100;
            document.getElementById('progressFill').style.width = progress + '%';
        }

        function submitSurvey() {
            var totalScore = 0;
            for (var key in answers) {
                totalScore += answers[key];
            }
            var maxScore = questions.length * 5;
            var percentage = (totalScore / maxScore) * 100;
            
            var level = 'low';
            if (percentage >= 55) {
                level = 'high';
            } else if (percentage >= 30) {
                level = 'medium';
            }
            
            showResults(level);
        }

        function showResults(level) {
            document.getElementById('surveySection').classList.add('hidden');
            document.getElementById('distractionSection').classList.add('hidden');
            document.getElementById('resultSection').classList.remove('hidden');
            
            var advice, emoji, title;
            if (level === 'high') {
                advice = highNeedAdvice;
                emoji = '&#128591;';
                title = 'Nivel: Requiere atencion';
            } else if (level === 'medium') {
                advice = mediumNeedAdvice;
                emoji = '&#127769;';
                title = 'Nivel: Moderado';
            } else {
                advice = lowNeedAdvice;
                emoji = '&#127775;';
                title = 'Nivel: Estable';
            }
            
            document.getElementById('resultEmoji').innerHTML = emoji;
            document.getElementById('resultTitle').textContent = title;
            
            var container = document.getElementById('adviceContainer');
            container.innerHTML = '';
            
            var shuffled = advice.slice().sort(function() { return 0.5 - Math.random() });
            for (var i = 0; i < Math.min(4, shuffled.length); i++) {
                container.innerHTML += '<div class="advice"><div class="advice-title">' + shuffled[i].emoji + ' ' + shuffled[i].title + '</div><p style="font-size: 0.85em;">' + shuffled[i].text + '</p></div>';
            }
        }

        function showDistraction() {
            document.getElementById('resultSection').classList.add('hidden');
            document.getElementById('distractionSection').classList.remove('hidden');
            newRandomTip();
        }

        function newRandomTip() {
            var tip = randomTips[Math.floor(Math.random() * randomTips.length)];
            document.getElementById('tipEmoji').innerHTML = tip.emoji;
            document.getElementById('tipText').textContent = tip.text;
        }

        function showResults() {
            document.getElementById('distractionSection').classList.add('hidden');
            document.getElementById('resultSection').classList.remove('hidden');
        }

        function restartSurvey() {
            document.getElementById('resultSection').classList.add('hidden');
            document.getElementById('surveySection').classList.remove('hidden');
            document.getElementById('progressFill').style.width = '0%';
            
            answers = {};
            initSurvey();
        }

        function toggleBreathing() {
            var btn = document.getElementById('breathBtn');
            var stopBtn = document.getElementById('stopBreathBtn');
            var circle = document.getElementById('breathCircle');
            var text = document.getElementById('breathText');
            
            if (isBreathing) {
                clearInterval(breathingInterval);
                isBreathing = false;
                btn.classList.remove('hidden');
                stopBtn.classList.add('hidden');
                text.textContent = 'Iniciar ejercicio';
                circle.style.transform = 'scale(1)';
            } else {
                isBreathing = true;
                btn.classList.add('hidden');
                stopBtn.classList.remove('hidden');
                
                var phase = 0;
                breathingInterval = setInterval(function() {
                    if (phase === 0) {
                        circle.style.transition = 'transform 4s ease-in-out';
                        circle.style.transform = 'scale(1.3)';
                        text.textContent = 'Inhala...';
                    } else if (phase === 1) {
                        text.textContent = 'Mantiene...';
                    } else {
                        circle.style.transition = 'transform 4s ease-in-out';
                        circle.style.transform = 'scale(1)';
                        text.textContent = 'Exhala...';
                    }
                    phase = (phase + 1) % 3;
                }, 4000);
            }
        }

        function generarQR() {
            var url = document.getElementById('urlInput').value.trim();
            if (!url) return;
            
            var qrContainer = document.getElementById('qrcode');
            qrContainer.innerHTML = '';
            
            var imgQR = document.createElement('img');
            imgQR.src = 'https://api.qrserver.com/v1/create-qr-code/?size=160x160&data=' + encodeURIComponent(url);
            imgQR.alt = 'QR Code';
            imgQR.style.borderRadius = '6px';
            imgQR.style.marginTop = '10px';
            imgQR.onload = function() {
                document.getElementById('qrSection').classList.add('hidden');
            };
            
            qrContainer.appendChild(imgQR);
        }

        initSurvey();
    </script>
</body>
</html>
